name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Stamp version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          for skill_dir in skills/*/; do
            sed -i "/^---$/,/^---$/s/^  version: .*/  version: $VERSION/" "${skill_dir}SKILL.md"
          done

      - name: Package all skills
        working-directory: .agents/skills/skill-creator
        run: |
          for skill_dir in ../../../skills/*/; do
            python -m scripts.package_skill "$skill_dir" ../../../dist
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.5.0
        with:
          files: dist/*.zip
          generate_release_notes: true
          body: |
            ## Install

            Open a **PowerShell** terminal in your project directory and run:

            ```powershell
            iwr https://raw.githubusercontent.com/bthornton191/adams_skills/main/install.ps1 -OutFile install.ps1; .\install.ps1
            ```

            This installs all skills into your project's skills folder (auto-detected, or `.agents\skills\` if none exists).

            **Linux / macOS:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/bthornton191/adams_skills/main/install.sh | bash
            ```

            **Manual:** download the `.zip` for the skill(s) you want from the assets below and extract into `.agents/skills/` in your project.
