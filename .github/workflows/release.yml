name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Package adams-subroutine-writer
        working-directory: .agents/skills/skill-creator
        run: python -m scripts.package_skill ../../../skills/adams-subroutine-writer ../../../dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/adams-subroutine-writer.zip
