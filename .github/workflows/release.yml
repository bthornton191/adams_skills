name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Stamp version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "/^---$/,/^---$/s/^  version: .*/  version: $VERSION/" skills/adams-subroutine-writer/SKILL.md

      - name: Package adams-subroutine-writer
        working-directory: .agents/skills/skill-creator
        run: python -m scripts.package_skill ../../../skills/adams-subroutine-writer ../../../dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.5.0
        with:
          files: dist/adams-subroutine-writer.zip
